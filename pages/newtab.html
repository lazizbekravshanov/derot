<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab — derot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/newtab.css">
</head>
<body>
  <div class="nt-container">
    <!-- Clock -->
    <div class="nt-clock" id="clock">00:00</div>

    <!-- Greeting -->
    <div class="nt-greeting" id="greeting">Good morning</div>

    <!-- Goal Ring -->
    <div class="nt-ring-wrap">
      <svg class="nt-ring-svg" viewBox="0 0 120 120">
        <circle class="nt-ring-bg" cx="60" cy="60" r="52"/>
        <circle class="nt-ring-fg" id="ntRingFg" cx="60" cy="60" r="52"
          stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="nt-ring-inner">
        <span class="nt-ring-value" id="ntFocusTime">0m</span>
        <span class="nt-ring-label">focused today</span>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="nt-stats">
      <div class="nt-stat">
        <span class="nt-stat-value" id="ntBlocked">0</span>
        <span class="nt-stat-label">Blocked</span>
      </div>
      <div class="nt-stat">
        <span class="nt-stat-value" id="ntStreak">0</span>
        <span class="nt-stat-label">Streak</span>
      </div>
      <div class="nt-stat">
        <span class="nt-stat-value" id="ntGoalPct">0%</span>
        <span class="nt-stat-label">Goal</span>
      </div>
      <div class="nt-stat">
        <span class="nt-stat-value" id="ntScore">--</span>
        <span class="nt-stat-label">Score</span>
      </div>
    </div>

    <!-- Active Challenges -->
    <div class="nt-challenges" id="ntChallenges"></div>

    <!-- Focus Button -->
    <button class="nt-focus-btn" id="ntFocusBtn">Start Focus</button>

    <!-- Quote -->
    <p class="nt-quote" id="ntQuote"></p>
  </div>

  <script src="../scripts/newtab.js"></script>
</body>
</html>
